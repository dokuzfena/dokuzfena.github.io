<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Dark Path | Klasik Labirent</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; box-shadow: 0 0 30px rgba(0,255,204,0.1); touch-action: none; background: #000; }
        #ui { position: absolute; top: 30px; text-align: center; pointer-events: none; }
        .controls { position: fixed; bottom: 30px; display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.05); border: 1px solid #444; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-size: 24px; color: #00ffcc; }
        .btn:active { background: rgba(0,255,204,0.2); transform: scale(0.9); }
        #msg { font-size: 14px; letter-spacing: 2px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px; font-weight: bold;">DARK PATH</div>
        <div id="msg">YOLUNU BUL...</div>
    </div>

    <canvas id="mazeCanvas"></canvas>

    <div class="controls">
        <div></div><div class="btn" id="up">▲</div><div></div>
        <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        
        // S24 Ultra ekranına göre boyutlandırma
        const cellSize = 30;
        const cols = 12;
        const rows = 12;
        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        let grid = [];
        let player = { x: 0, y: 0 };

        class Cell {
            constructor(r, c) {
                this.r = r; this.c = c;
                this.walls = [true, true, true, true]; // Üst, Sağ, Alt, Sol
                this.visited = false;
            }
        }

        function setup() {
            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) grid[r][c] = new Cell(r, c);
            }
            generateMaze(0, 0);
            draw();
        }

        function generateMaze(r, c) {
            grid[r][c].visited = true;
            let neighbors = [];
            if(r > 0 && !grid[r-1][c].visited) neighbors.push(grid[r-1][c]);
            if(c < cols-1 && !grid[r][c+1].visited) neighbors.push(grid[r][c+1]);
            if(r < rows-1 && !grid[r+1][c].visited) neighbors.push(grid[r+1][c]);
            if(c > 0 && !grid[r][c-1].visited) neighbors.push(grid[r][c-1]);

            while(neighbors.length > 0) {
                let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                removeWalls(grid[r][c], next);
                generateMaze(next.r, next.c);
                // Yeniden komşu kontrolü
                neighbors = [];
                if(r > 0 && !grid[r-1][c].visited) neighbors.push(grid[r-1][c]);
                if(c < cols-1 && !grid[r][c+1].visited) neighbors.push(grid[r][c+1]);
                if(r < rows-1 && !grid[r+1][c].visited) neighbors.push(grid[r+1][c]);
                if(c > 0 && !grid[r][c-1].visited) neighbors.push(grid[r][c-1]);
            }
        }

        function removeWalls(a, b) {
            let x = a.c - b.c;
            if(x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if(x === -1) { a.walls[1] = false; b.walls[3] = false; }
            let y = a.r - b.r;
            if(y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if(y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Labirenti çiz
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    let x = c * cellSize, y = r * cellSize;
                    ctx.strokeStyle = "#222";
                    ctx.lineWidth = 2;
                    if(grid[r][c].walls[0]) line(x, y, x+cellSize, y);
                    if(grid[r][c].walls[1]) line(x+cellSize, y, x+cellSize, y+cellSize);
                    if(grid[r][c].walls[2]) line(x+cellSize, y+cellSize, x, y+cellSize);
                    if(grid[r][c].walls[3]) line(x, y+cellSize, x, y);
                }
            }

            // Çıkış Kapısı (Flaş efekti)
            ctx.fillStyle = "#ff0055";
            ctx.fillRect((cols-1)*cellSize+8, (rows-1)*cellSize+8, cellSize-16, cellSize-16);

            // Oyuncu
            ctx.fillStyle = "#00ffcc";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ffcc";
            ctx.beginPath();
            ctx.arc(player.x*cellSize+cellSize/2, player.y*cellSize+cellSize/2, cellSize/4, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // SAVAŞ SİSİ (Fog of War)
            // Oyuncunun etrafını aydınlat, gerisini karart
            let gradient = ctx.createRadialGradient(
                player.x*cellSize+cellSize/2, player.y*cellSize+cellSize/2, 10,
                player.x*cellSize+cellSize/2, player.y*cellSize+cellSize/2, 100
            );
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function line(x1, y1, x2, y2) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        function move(dir) {
            let current = grid[player.y][player.x];
            if(dir === 'up' && !current.walls[0]) player.y--;
            if(dir === 'right' && !current.walls[1]) player.x++;
            if(dir === 'down' && !current.walls[2]) player.y++;
            if(dir === 'left' && !current.walls[3]) player.x--;
            
            draw();
            if(player.x === cols-1 && player.y === rows-1) {
                alert("LABİRENTİ ÇÖZDÜN!");
                location.reload();
            }
        }

        // Kontroller
        document.getElementById('up').onclick = () => move('up');
        document.getElementById('down').onclick = () => move('down');
        document.getElementById('left').onclick = () => move('left');
        document.getElementById('right').onclick = () => move('right');
        
        window.addEventListener('keydown', e => {
            if(e.key === "ArrowUp") move('up');
            if(e.key === "ArrowDown") move('down');
            if(e.key === "ArrowLeft") move('left');
            if(e.key === "ArrowRight") move('right');
        });

        setup();
    </script>
</body>
</html>
