<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9FA | Gürültü Sensörü</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --danger: #ff3b30; --safe: #34c759; }
        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            transition: background 0.2s;
        }

        .noise-card {
            width: 95%; max-width: 500px; padding: 40px;
            border-radius: 30px; background: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center; border: 1px solid #eee;
            position: relative; z-index: 2;
        }

        h1 { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 4px; color: #888; margin-bottom: 30px; }

        .meter-container {
            width: 200px; height: 200px; margin: 0 auto 30px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle {
            fill: none; stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 565; stroke-dashoffset: 565;
            transition: stroke-dashoffset 0.1s, stroke 0.3s;
        }
        .bg-circle { stroke: #f2f2f7; stroke-dashoffset: 0; }
        .progress-circle { stroke: var(--safe); }

        .db-value { position: absolute; font-family: 'Orbitron'; font-size: 32px; font-weight: 700; }

        .status-msg { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; min-height: 20px; margin-bottom: 30px; }

        button {
            width: 100%; padding: 18px; background: #000; color: #fff;
            border: none; border-radius: 15px; font-family: 'Orbitron';
            font-size: 11px; cursor: pointer; letter-spacing: 2px; transition: 0.3s;
        }
        button:active { transform: scale(0.98); }

        .alarm-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--danger); opacity: 0; visibility: hidden; z-index: 1;
        }
        .panic-mode .alarm-overlay { animation: flash 0.4s infinite; visibility: visible; }

        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 0.3; } 100% { opacity: 0; } }
        
        .hint { font-size: 10px; color: #bbb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="alarm-overlay"></div>

<div class="noise-card">
    <h1>UNIT 04: NOISE SENSOR</h1>
    
    <div class="status-msg" id="msg">BAŞLATMAK İÇİN BUTONA BASIN</div>

    <div class="meter-container">
        <svg viewBox="0 0 200 200">
            <circle class="bg-circle" cx="100" cy="100" r="90"></circle>
            <circle id="progress" class="progress-circle" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="db-value" id="dbText">0</div>
    </div>

    <button id="startBtn" onclick="toggleSensor()">SENSORÜ UYANDIR</button>
    <div class="hint">Not: Mikrofon izni gereklidir.</div>
</div>

<script>
    let audioContext;
    let analyser;
    let microphone;
    let javascriptNode;
    let isRunning = false;

    async function toggleSensor() {
        if (isRunning) {
            location.reload();
            return;
        }

        try {
            // 1. Kullanıcı etkileşimi içinde Mikrofon izni iste
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 2. AudioContext'i burada (etkileşim içinde) başlat
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            
            // 3. Analizör ayarları
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8;
            analyser.fftSize = 1024;

            microphone.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                let values = 0;
                for (let i = 0; i < array.length; i++) { values += array[i]; }
                const average = values / array.length;
                updateUI(Math.round(average));
            };

            document.getElementById('startBtn').innerText = "SENSORÜ DURDUR";
            document.getElementById('msg').innerText = "SENSÖR AKTİF";
            isRunning = true;

        } catch (err) {
            console.error("Sensör Başlatılamadı:", err);
            if (err.name === 'NotAllowedError') {
                alert("Hata: Mikrofon izni reddedildi. Lütfen tarayıcı ayarlarından siteye izin verin.");
            } else {
                alert("Bağlantı Hatası: " + err.message);
            }
        }
    }

    function updateUI(db) {
        const circle = document.getElementById('progress');
        const dbText = document.getElementById('dbText');
        const msg = document.getElementById('msg');
        
        dbText.innerText = db;
        
        // Göstergeyi güncelle (0-100 arası varsayarak)
        const offset = 565 - (db * 5.65);
        circle.style.strokeDashoffset = Math.max(0, offset);

        // KRİTİK EŞİK: 80 dB
        if (db > 80) {
            document.body.classList.add('panic-mode');
            msg.innerText = "YÜKSEK SES! HOCA GELİYOR!";
            msg.style.color = "var(--danger)";
            circle.style.stroke = "var(--danger)";
        } else if (db > 40) {
            document.body.classList.remove('panic-mode');
            msg.innerText = "GÜRÜLTÜ SEVİYESİ ARTIYOR";
            msg.style.color = "#ff9500";
            circle.style.stroke = "#ff9500";
        } else {
            document.body.classList.remove('panic-mode');
            msg.innerText = "ORTAM SESSİZ VE GÜVENLİ";
            msg.style.color = "var(--safe)";
            circle.style.stroke = "var(--safe)";
        }
    }
</script>

</body>
</html>
