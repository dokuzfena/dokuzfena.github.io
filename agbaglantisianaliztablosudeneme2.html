<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Analizörü | Profesyonel Araçlar</title>
    <style>
        /* Quiet Luxury Tasarım Çizgisi */
        :root {
            --bg-color: #fcfcfc;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --border-color: #e5e5e7;
            --row-hover: #f5f5f7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .analysis-container {
            width: 90%;
            max-width: 500px;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
        }

        h2 {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .analysis-table {
            width: 100%;
            border-collapse: collapse;
        }

        .analysis-table tr {
            border-bottom: 1px solid var(--border-color);
        }

        .analysis-table td {
            padding: 16px 10px;
            font-size: 15px;
        }

        .label {
            font-weight: 500;
            color: #86868b;
            width: 45%;
        }

        .value {
            font-weight: 400;
            text-align: right;
            color: var(--text-color);
            word-break: break-all;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background-color: var(--text-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover { opacity: 0.9; }
        .refresh-btn:active { transform: scale(0.98); }

        .loading-text {
            color: #b0b0b0;
            font-style: italic;
        }

        .error-text {
            color: #ff3b30;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="analysis-container">
    <h2>Ağ Analizi</h2>
    <table class="analysis-table">
        <tr>
            <td class="label">IP Adresi</td>
            <td id="ip-addr" class="value loading-text">Yükleniyor...</td>
        </tr>
        <tr>
            <td class="label">Lokasyon</td>
            <td id="location" class="value loading-text">Yükleniyor...</td>
        </tr>
        <tr>
            <td class="label">Sağlayıcı (ISP)</td>
            <td id="isp" class="value loading-text">Yükleniyor...</td>
        </tr>
        <tr>
            <td class="label">Cihaz / OS</td>
            <td id="os-info" class="value">Tespit ediliyor...</td>
        </tr>
        <tr>
            <td class="label">Gecikme (Ping)</td>
            <td id="ping-val" class="value">-</td>
        </tr>
    </table>
    <button onclick="agAnaliziYap()" class="refresh-btn">Analizi Yenile</button>
</div>

<script>
    async function agAnaliziYap() {
        const fields = {
            ip: document.getElementById('ip-addr'),
            loc: document.getElementById('location'),
            isp: document.getElementById('isp'),
            ping: document.getElementById('ping-val')
        };

        // UI Sıfırlama
        Object.values(fields).forEach(el => {
            el.innerText = "...";
            el.classList.add('loading-text');
        });

        const startTime = Date.now();

        // 1. Seçenek: ipwhois (HTTPS dostu ve daha esnek)
        try {
            const response = await fetch('https://ipwho.is/');
            if (!response.ok) throw new Error("Ana servis başarısız");
            
            const data = await response.json();
            const endTime = Date.now();

            fields.ip.innerText = data.ip;
            fields.loc.innerText = `${data.city || ''}, ${data.country || ''}`;
            fields.isp.innerText = data.connection?.isp || "Bilinmiyor";
            fields.ping.innerText = (endTime - startTime) + " ms";

        } catch (error) {
            console.warn("İlk API başarısız, ikinci deneniyor...");
            
            // 2. Seçenek: ipapi.co (Yedek)
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                fields.ip.innerText = data.ip;
                fields.loc.innerText = `${data.city}, ${data.country_name}`;
                fields.isp.innerText = data.org;
                fields.ping.innerText = "N/A";
            } catch (altError) {
                fields.ip.innerHTML = '<span class="error-text">Bağlantı Sorunu</span>';
                fields.loc.innerText = "Engellendi";
                fields.isp.innerText = "VPN/AdBlock aktif olabilir";
            }
        }

        // Yükleme stilini kaldır
        Object.values(fields).forEach(el => el.classList.remove('loading-text'));
        
        // Sistem Bilgisi
        document.getElementById('os-info').innerText = getPlatformInfo();
    }

    function getPlatformInfo() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) return "Android";
        if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
        if (/Windows/i.test(ua)) return "Windows";
        if (/Mac/i.test(ua)) return "macOS";
        return "Bilinmeyen Sistem";
    }

    window.onload = agAnaliziYap;
</script>

</body>
</html>
