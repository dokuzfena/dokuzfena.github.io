<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konum ve Sistem Analizi</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --subtext: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        h2 { font-weight: 600; font-size: 22px; margin-bottom: 25px; text-align: center; letter-spacing: -0.5px; }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--subtext);
            margin: 20px 0 10px 5px;
            letter-spacing: 0.8px;
        }

        .info-box {
            background: #fbfbfd;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .row:last-child { border-bottom: none; }

        .label { color: var(--subtext); font-size: 14px; }
        .value { font-weight: 500; font-size: 14px; text-align: right; }

        .btn-action {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-action:active { transform: scale(0.98); }

        #map-link {
            display: none;
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .active { background-color: #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Analizi</h2>

    <div class="section-label">Bağlantı Bilgisi</div>
    <div class="info-box">
        <div class="row">
            <span class="label">Durum</span>
            <span class="value"><span id="dot" class="status-dot"></span> <span id="status-text">Bağlanıyor</span></span>
        </div>
        <div class="row">
            <span class="label">Gecikme (Ping)</span>
            <span id="ping" class="value">- ms</span>
        </div>
    </div>

    <div class="section-label">Cihaz Bilgisi</div>
    <div class="info-box">
        <div class="row">
            <span class="label">İşletim Sistemi</span>
            <span id="os" class="value">Tespit ediliyor...</span>
        </div>
        <div class="row">
            <span class="label">Dil / Bölge</span>
            <span id="lang" class="value">-</span>
        </div>
    </div>

    <div class="section-label">Tam Konum (GPS)</div>
    <div class="info-box">
        <div class="row">
            <span class="label">Koordinatlar</span>
            <span id="coords" class="value">İzin Bekleniyor</span>
        </div>
        <div class="row">
            <span class="label">Hata Payı</span>
            <span id="accuracy" class="value">-</span>
        </div>
    </div>

    <button class="btn-action" onclick="analizEt()">Analizi Başlat / Yenile</button>
    <a id="map-link" target="_blank">📍 Haritada Görüntüle</a>
</div>

<script>
    function analizEt() {
        // Ping Ölçümü
        const start = Date.now();
        fetch(window.location.href, { mode: 'no-cors' }).then(() => {
            document.getElementById('ping').innerText = (Date.now() - start) + " ms";
            document.getElementById('dot').classList.add('active');
            document.getElementById('status-text').innerText = "Aktif";
        });

        // Cihaz Bilgileri
        document.getElementById('os').innerText = getOS();
        document.getElementById('lang').innerText = navigator.language.toUpperCase();

        // Konum Bulma
        if (navigator.geolocation) {
            document.getElementById('coords').innerText = "İzin İsteniyor...";
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude.toFixed(5);
                const lon = pos.coords.longitude.toFixed(5);
                document.getElementById('coords').innerText = `${lat}, ${lon}`;
                document.getElementById('accuracy').innerText = `±${Math.round(pos.coords.accuracy)}m`;
                
                const link = document.getElementById('map-link');
                link.href = `https://www.google.com/maps?q=${lat},${lon}`;
                link.style.display = "block";
            }, (err) => {
                document.getElementById('coords').innerText = "İzin Verilmedi";
            }, { enableHighAccuracy: true });
        }
    }

    function getOS() {
        const ua = navigator.userAgent;
        if (/Android/i.test(ua)) return "Android";
        if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
        if (/Windows/i.test(ua)) return "Windows";
        if (/Mac/i.test(ua)) return "macOS";
        return "Bilinmeyen";
    }

    // Sayfa açıldığında otomatik tetikle
    window.onload = analizEt;
</script>

</body>
</html>
