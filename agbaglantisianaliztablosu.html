<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Analizörü | Profesyonel Araçlar</title>
    <style>
        /* Quiet Luxury Tasarım Çizgisi */
        :root {
            --bg-color: #fcfcfc;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --border-color: #e5e5e7;
            --row-hover: #f5f5f7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .analysis-container {
            width: 90%;
            max-width: 500px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
        }

        h2 {
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .analysis-table {
            width: 100%;
            border-collapse: collapse;
        }

        .analysis-table tr {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s ease;
        }

        .analysis-table tr:hover {
            background-color: var(--row-hover);
        }

        .analysis-table tr:last-child {
            border-bottom: none;
        }

        .analysis-table td {
            padding: 18px 10px;
            font-size: 15px;
        }

        .label {
            font-weight: 500;
            color: #86868b;
            width: 40%;
        }

        .value {
            font-weight: 400;
            text-align: right;
            color: var(--text-color);
        }

        .refresh-btn {
            width: 100%;
            margin-top: 30px;
            padding: 14px;
            background-color: var(--text-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        .loading-text {
            color: #aaa;
            font-size: 13px;
            font-style: italic;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 480px) {
            .analysis-container {
                padding: 25px;
            }
            h2 { font-size: 20px; }
            .analysis-table td { padding: 15px 5px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="analysis-container">
    <h2>Ağ Analizi</h2>
    <table class="analysis-table">
        <tr>
            <td class="label">IP Adresi</td>
            <td id="ip-addr" class="value loading-text">Analiz ediliyor...</td>
        </tr>
        <tr>
            <td class="label">Lokasyon</td>
            <td id="location" class="value loading-text">Analiz ediliyor...</td>
        </tr>
        <tr>
            <td class="label">Sağlayıcı (ISP)</td>
            <td id="isp" class="value loading-text">Analiz ediliyor...</td>
        </tr>
        <tr>
            <td class="label">Cihaz / OS</td>
            <td id="os-info" class="value">Tespit ediliyor...</td>
        </tr>
        <tr>
            <td class="label">Gecikme (Ping)</td>
            <td id="ping-val" class="value">-</td>
        </tr>
    </table>
    <button onclick="agAnaliziYap()" class="refresh-btn">Analizi Yenile</button>
</div>

<script>
    async function agAnaliziYap() {
        const ipText = document.getElementById('ip-addr');
        const locText = document.getElementById('location');
        const ispText = document.getElementById('isp');
        const pingText = document.getElementById('ping-val');

        // Yükleniyor durumuna geri getir
        [ipText, locText, ispText].forEach(el => {
            el.innerText = "Analiz ediliyor...";
            el.classList.add('loading-text');
        });

        const startTime = Date.now();
        
        try {
            // Veri çekme
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            const endTime = Date.now();

            // Verileri Yazdır
            ipText.innerText = data.ip || "Bilinmiyor";
            locText.innerText = `${data.city || ''}, ${data.country_name || 'Bilinmiyor'}`;
            ispText.innerText = data.org || "Bilinmiyor";
            pingText.innerText = (endTime - startTime) + " ms";
            
            // Loading sınıfını kaldır
            [ipText, locText, ispText].forEach(el => el.classList.remove('loading-text'));

            // Sistem Bilgisi
            document.getElementById('os-info').innerText = getSimplePlatform();

        } catch (error) {
            console.error("Hata:", error);
            ipText.innerText = "Hata oluştu";
        }
    }

    function getSimplePlatform() {
        const ua = navigator.userAgent;
        if (ua.includes("Win")) return "Windows";
        if (ua.includes("Mac")) return "macOS / iOS";
        if (ua.includes("Android")) return "Android";
        if (ua.includes("Linux")) return "Linux";
        return "Mobil/Masaüstü";
    }

    // Sayfa açıldığında otomatik başlat
    window.onload = agAnaliziYap;
</script>

</body>
</html>
