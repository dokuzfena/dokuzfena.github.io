<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro-Shooter v1.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: fixed; top: 20px; left: 20px; pointer-events: none;
            text-shadow: 0 0 10px #00ffcc;
        }
        #score { font-size: 24px; }
        #ai-status { font-size: 12px; color: #ff0055; margin-top: 5px; }
        #game-over {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; background: rgba(0,0,0,0.9);
            padding: 40px; border: 2px solid #00ffcc; border-radius: 20px;
        }
        button {
            background: transparent; border: 1px solid #00ffcc; color: #00ffcc;
            padding: 10px 20px; cursor: pointer; font-family: inherit; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">SKOR: 0</div>
        <div id="ai-status">AI ANALİZ EDİLİYOR...</div>
    </div>

    <div id="game-over">
        <h1>SİSTEM ÇÖKTÜ</h1>
        <p id="final-score">Skor: 0</p>
        <button onclick="location.reload()">REBOOT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiScore = document.getElementById('score');
        const uiAI = document.getElementById('ai-status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let leftSideKills = 0;
        let rightSideKills = 0;

        // Oyuncu
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#00ffcc'
        };

        const projectiles = [];
        const enemies = [];
        const particles = [];

        // Mermi Atışı
        window.addEventListener('pointerdown', (e) => {
            if (!gameActive) return;
            const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
            projectiles.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                radius: 4
            });
        });

        // Düşman Oluşturucu (AI Mantığıyla)
        function spawnEnemy() {
            if (!gameActive) return;
            
            let x, y;
            const radius = 12 + Math.random() * 8;
            
            // AI ANALİZİ: Oyuncu hangi tarafı daha çok temizliyor?
            // Az temizlenen taraftan daha hızlı/çok düşman gönder
            const spawnSide = (leftSideKills > rightSideKills + 5) ? 'right' : 
                              (rightSideKills > leftSideKills + 5) ? 'left' : 'random';

            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const angle = Math.atan2(player.y - y, player.x - x);
            
            // AI Hız Adaptasyonu
            let speed = 1.5 + (score / 2000);
            if ((spawnSide === 'left' && x < canvas.width/2) || (spawnSide === 'right' && x > canvas.width/2)) {
                speed *= 1.5; // Zayıf taraftan gelenler daha hızlı!
                uiAI.innerText = "AI ADAPTASYONU: ZAYIF NOKTA TESPİT EDİLDİ";
            }

            enemies.push({ x, y, radius, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed });
            
            setTimeout(spawnEnemy, Math.max(200, 1000 - score / 10));
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    alpha: 1,
                    color
                });
            }
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Oyuncuyu Çiz
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.closePath();

            // Mermiler
            projectiles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0055';
                ctx.fill();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(index, 1);
                }
            });

            // Düşmanlar
            enemies.forEach((enemy, eIndex) => {
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#ff0055';
                ctx.stroke();

                // Çarpışma: Oyuncu & Düşman
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist - enemy.radius - player.radius < 1) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-score').innerText = "Skor: " + score;
                }

                // Çarpışma: Mermi & Düşman
                projectiles.forEach((p, pIndex) => {
                    const d = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (d - enemy.radius - p.radius < 1) {
                        createExplosion(enemy.x, enemy.y, '#ff0055');
                        
                        // AI İstatistiklerini Topla
                        if (enemy.x < canvas.width / 2) leftSideKills++;
                        else rightSideKills++;

                        enemies.splice(eIndex, 1);
                        projectiles.splice(pIndex, 1);
                        score += 100;
                        uiScore.innerText = "SKOR: " + score;
                    }
                });
            });

            // Patlama Efektleri
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
                if (p.alpha <= 0) particles.splice(index, 1);
            });
            ctx.globalAlpha = 1;
        }

        spawnEnemy();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
        });
    </script>
</body>
</html>
