<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeetFlow Pro Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #000; color: white; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-dark { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        
        video { object-fit: cover; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #local-video { transform: scaleX(-1); }
        
        /* Mobil Chat Drawer */
        #chat-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        #chat-panel.open { transform: translateY(0) !important; }
        
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .control-btn { @apply w-14 h-14 rounded-full flex items-center justify-center transition-all active:scale-90; }
    </style>
</head>
<body class="flex flex-col">

    <div id="lobby" class="absolute inset-0 z-50 bg-[#050505] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-bold tracking-tighter mb-2 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">MeetFlow</h1>
        <p class="text-blue-500 text-[10px] tracking-[0.4em] uppercase mb-12">Mobile HD Suite</p>

        <div class="glass p-8 rounded-[3rem] w-full max-w-sm flex flex-col items-center">
            <span class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Kendi Kimliğin</span>
            <div id="my-id" class="text-2xl font-mono text-white mb-8">Bağlanıyor...</div>

            <input type="tel" id="remote-id" maxlength="10" placeholder="Numara Yazın" 
                class="bg-white/5 border-none focus:ring-1 ring-white/20 text-white text-center text-2xl rounded-2xl py-4 w-full mb-6 font-mono outline-none">
            
            <button id="call-btn" class="bg-green-500 w-20 h-20 rounded-full flex items-center justify-center shadow-2xl shadow-green-500/40">
                <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
            </button>
        </div>
    </div>

    <div id="call-screen" class="hidden absolute inset-0 bg-black overflow-hidden">
        <video id="remote-video" autoplay playsinline class="bg-neutral-900"></video>

        <div class="absolute top-10 right-4 w-28 h-40 rounded-2xl overflow-hidden shadow-2xl border border-white/20 z-20">
            <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="absolute bottom-8 left-0 right-0 z-40 flex flex-col items-center gap-4 safe-area-bottom">
            <div class="glass-dark px-4 py-3 rounded-full flex items-center gap-3 backdrop-blur-xl">
                <button id="toggle-mic" class="control-btn glass text-white"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z"/></svg></button>
                <button id="toggle-video" class="control-btn glass text-white"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17,10.5V7A1,1 0 0,0 16,6H4A1,1 0 0,0 3,7V17A1,1 0 0,0 4,18H16A1,1 0 0,0 17,17V13.5L21,17.5V6.5L17,10.5Z"/></svg></button>
                <button id="toggle-chat" class="control-btn glass text-white"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20,2H4A2,2 0 0,0 2,4V22L6,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2M20,16H5.17L4,17.17V4H20V16Z"/></svg></button>
                <button id="hangup-btn" class="control-btn bg-red-500"><svg width="28" height="28" fill="white" viewBox="0 0 24 24"><path d="M12,9C10.4,9 8.85,9.25 7.4,9.72V12.82C7.4,13.22 7.17,13.56 6.84,13.72C5.86,14.21 4.97,14.84 4.17,15.57C4,15.75 3.75,15.86 3.5,15.86C3.2,15.86 2.95,15.74 2.77,15.56L0.29,13.08C0.11,12.9 0,12.65 0,12.38C0,12.1 0.11,11.85 0.29,11.67C3.38,8.77 7.48,7 12,7C16.52,7 20.62,8.77 23.71,11.67C23.89,11.85 24,12.1 24,12.38C24,12.65 23.89,12.9 23.71,13.08L21.23,15.56C21.05,15.74 20.8,15.86 20.5,15.86C20.25,15.86 20,15.75 19.82,15.57C19.03,14.84 18.14,14.21 17.16,13.72C16.83,13.56 16.6,13.22 16.6,12.82V9.72C15.15,9.25 13.6,9 12,9Z"/></svg></button>
            </div>
        </div>

        <div id="chat-panel" class="fixed inset-x-0 bottom-0 h-[70vh] glass-dark rounded-t-[3rem] p-6 translate-y-full border-t border-white/10 flex flex-col">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6" id="pull-bar"></div>
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 text-sm scrollbar-hide"></div>
            <div class="flex gap-2 items-center mb-2">
                <input type="text" id="chat-input" placeholder="Bir şeyler yaz..." class="flex-1 bg-white/10 rounded-2xl px-5 py-4 outline-none border border-white/5 text-base">
                <button id="send-btn" class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center">➤</button>
            </div>
        </div>
    </div>

    <script>
        const lobby = document.getElementById('lobby');
        const callScreen = document.getElementById('call-screen');
        const myIdDisplay = document.getElementById('my-id');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const chatPanel = document.getElementById('chat-panel');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        
        let localStream, currentCall, currentConn;
        let isMicOpen = true, isVidOpen = true;

        const myUniqueId = "5" + Math.floor(100000000 + Math.random() * 900000000).toString();
        const peer = new Peer(myUniqueId);

        async function initCamera() {
            try {
                // Mobil için ideal donanım ayarları
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
            } catch (err) {
                console.error("Kamera açılamadı:", err);
            }
        }

        peer.on('open', id => myIdDisplay.innerText = id);

        peer.on('call', call => {
            if(confirm("Gelen Arama: " + call.peer)) {
                currentCall = call;
                call.answer(localStream);
                setupCall(call);
            }
        });

        peer.on('connection', conn => {
            currentConn = conn;
            conn.on('data', data => addMessage(data, 'remote'));
        });

        document.getElementById('call-btn').onclick = () => {
            const rId = document.getElementById('remote-id').value;
            if(rId.length !== 10) return;
            
            currentCall = peer.call(rId, localStream);
            currentConn = peer.connect(rId);
            setupCall(currentCall);
            
            currentConn.on('open', () => {
                currentConn.on('data', data => addMessage(data, 'remote'));
            });
        };

        function setupCall(call) {
            lobby.classList.add('hidden');
            callScreen.classList.remove('hidden');
            call.on('stream', stream => remoteVideo.srcObject = stream);
            call.on('close', () => location.reload());
        }

        function addMessage(msg, type) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[85%] ${type === 'me' ? 'bg-blue-600 ml-auto' : 'bg-white/10'}`;
            div.innerText = msg;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => {
            const msg = chatInput.value;
            if(msg && currentConn) {
                currentConn.send(msg);
                addMessage(msg, 'me');
                chatInput.value = '';
            }
        };

        // Mobil Kontroller
        document.getElementById('toggle-mic').onclick = function() {
            isMicOpen = !isMicOpen;
            localStream.getAudioTracks()[0].enabled = isMicOpen;
            this.classList.toggle('bg-red-500', !isMicOpen);
        };

        document.getElementById('toggle-video').onclick = function() {
            isVidOpen = !isVidOpen;
            localStream.getVideoTracks()[0].enabled = isVidOpen;
            this.classList.toggle('bg-red-500', !isVidOpen);
        };

        document.getElementById('toggle-chat').onclick = () => chatPanel.classList.toggle('open');
        document.getElementById('pull-bar').onclick = () => chatPanel.classList.remove('open');
        document.getElementById('hangup-btn').onclick = () => location.reload();

        initCamera();
    </script>
</body>
</html>
