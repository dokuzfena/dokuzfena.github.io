<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesli Arama | 10 Haneli Sistem</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #ffffff;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-gray: #e5e5ea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .phone-frame {
            width: 360px;
            height: 720px;
            background: var(--ios-bg);
            border-radius: 45px;
            position: relative;
            overflow: hidden;
            color: #000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Üst Panel */
        .status-header {
            padding: 40px 20px 10px;
            text-align: center;
        }

        .my-number-label {
            font-size: 12px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #my-id-display {
            font-size: 20px;
            font-weight: 600;
            color: var(--ios-blue);
            margin-top: 5px;
        }

        /* Numara Ekranı */
        .number-input-area {
            font-size: 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Tuş Takımı */
        .dial-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
            margin-top: auto;
            margin-bottom: 40px;
        }

        .digit-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: var(--ios-gray);
            border: none;
            font-size: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .digit-btn:active { background: #d1d1d6; }
        .digit-btn span { font-size: 10px; color: #555; font-weight: bold; }

        .action-btns {
            grid-column: 1 / span 3;
            display: flex;
            justify-content: center;
            padding-top: 10px;
        }

        .call-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: var(--ios-green);
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        .backspace-btn {
            position: absolute;
            right: 40px;
            bottom: 60px;
            border: none;
            background: none;
            font-size: 20px;
            color: #8e8e93;
            cursor: pointer;
        }

        /* Aktif Arama Ekranı (Overlay) */
        #incall-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            color: white;
            z-index: 1000;
        }

        .hangup-btn {
            width: 75px; height: 75px;
            background: var(--ios-red);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="status-header">
        <div class="my-number-label">Senin Numaran</div>
        <div id="my-id-display">Tahsis ediliyor...</div>
    </div>

    <div class="number-input-area" id="display"></div>

    <div class="dial-pad">
        <button class="digit-btn" onclick="addDigit('1')">1</button>
        <button class="digit-btn" onclick="addDigit('2')">2<span>ABC</span></button>
        <button class="digit-btn" onclick="addDigit('3')">3<span>DEF</span></button>
        <button class="digit-btn" onclick="addDigit('4')">4<span>GHI</span></button>
        <button class="digit-btn" onclick="addDigit('5')">5<span>JKL</span></button>
        <button class="digit-btn" onclick="addDigit('6')">6<span>MNO</span></button>
        <button class="digit-btn" onclick="addDigit('7')">7<span>PQRS</span></button>
        <button class="digit-btn" onclick="addDigit('8')">8<span>TUV</span></button>
        <button class="digit-btn" onclick="addDigit('9')">9<span>WXYZ</span></button>
        <button class="digit-btn" style="background:none"></button>
        <button class="digit-btn" onclick="addDigit('0')">0</button>
        <button class="digit-btn" style="background:none"></button>
        
        <div class="action-btns">
            <button class="call-btn" onclick="startCall()">
                <i class="fas fa-phone"></i>
            </button>
        </div>
        <button class="backspace-btn" onclick="backspace()">
            <i class="fas fa-backspace"></i>
        </button>
    </div>

    <div id="incall-screen">
        <div style="text-align:center">
            <h2 id="remote-number-title" class="pulse">0500 000 00 00</h2>
            <p id="call-status">Aranıyor...</p>
        </div>
        <button class="hangup-btn" onclick="endCall()">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>
</div>

<audio id="audio-stream" autoplay></audio>

<script>
    // 1. 10 Haneli Numara Oluşturma (Rastgele 5XX XXX XX XX formatına uygun)
    const generate10DigitId = () => {
        return Math.floor(5000000000 + Math.random() * 999999999).toString();
    };

    const myId = generate10DigitId();
    const peer = new Peer(myId);
    let currentCall = null;
    let inputNumber = "";

    // Peer Başlatma
    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = formatNumber(id);
    });

    // Numara Tuşlama
    function addDigit(digit) {
        if (inputNumber.length < 10) {
            inputNumber += digit;
            updateDisplay();
        }
    }

    function backspace() {
        inputNumber = inputNumber.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display').innerText = formatNumber(inputNumber);
    }

    // Numara Formatlayıcı (Okunabilirlik için)
    function formatNumber(num) {
        if (!num) return "";
        let match = num.match(/^(\d{3})(\d{3})(\d{2})(\d{2})$/);
        if (match) {
            return `(${match[1]}) ${match[2]} ${match[3]} ${match[4]}`;
        }
        return num;
    }

    // ARAMA YAPMA
    async function startCall() {
        if (inputNumber.length < 10) {
            alert("Lütfen 10 haneli bir numara girin.");
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall = peer.call(inputNumber, stream);
            
            showCallScreen(inputNumber, "Aranıyor...");
            
            currentCall.on('stream', (remoteStream) => {
                const audio = document.getElementById('audio-stream');
                audio.srcObject = remoteStream;
                document.getElementById('call-status').innerText = "Bağlandı";
            });

            currentCall.on('close', () => hideCallScreen());

        } catch (err) {
            alert("Mikrofon izni gerekli!");
        }
    }

    // ARAMA ALMA
    peer.on('call', async (call) => {
        const accept = confirm(formatNumber(call.peer) + " arıyor. Cevaplamak ister misiniz?");
        
        if (accept) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(stream);
                currentCall = call;
                
                showCallScreen(call.peer, "Görüşme Devam Ediyor");
                
                call.on('stream', (remoteStream) => {
                    const audio = document.getElementById('audio-stream');
                    audio.srcObject = remoteStream;
                });

                call.on('close', () => hideCallScreen());
            } catch (err) {
                alert("Mikrofon erişilemedi.");
            }
        } else {
            call.close();
        }
    });

    // Ekran Yönetimi
    function showCallScreen(id, status) {
        document.getElementById('remote-number-title').innerText = formatNumber(id);
        document.getElementById('call-status').innerText = status;
        document.getElementById('incall-screen').style.display = 'flex';
    }

    function hideCallScreen() {
        document.getElementById('incall-screen').style.display = 'none';
        inputNumber = "";
        updateDisplay();
    }

    function endCall() {
        if (currentCall) currentCall.close();
        hideCallScreen();
    }

    // Hata Yönetimi
    peer.on('error', (err) => {
        console.error(err);
        if(err.type === 'peer-unavailable') {
            alert("Aradığınız numara şu an aktif değil.");
            hideCallScreen();
        }
    });
</script>

</body>
</html>
