<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeetFlow Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: -apple-system, system-ui, sans-serif; height: 100vh; width: 100vw; overflow: hidden; color: white; }
        
        /* Video Katmanları */
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 10; background: #0a0a0a; }
        #local-video-container { 
            position: absolute; top: env(safe-area-inset-top, 20px); right: 15px; 
            width: 110px; height: 160px; z-index: 30; border-radius: 1.2rem; 
            overflow: hidden; border: 1.5px solid rgba(255,255,255,0.15);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6); background: #1a1a1a;
            transition: all 0.3s ease;
        }
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* UI Kontrolleri */
        .glass-ui { background: rgba(0,0,0,0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        #chat-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75vh; 
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 100; border-radius: 2.5rem 2.5rem 0 0;
        }
        #chat-panel.open { transform: translateY(0); }
        .hidden { display: none !important; }
        
        /* Buton Efektleri */
        .ctrl-btn { @apply w-14 h-14 rounded-full flex items-center justify-center transition-all active:scale-90 pointer-events-auto; }
        .btn-red { background-color: #ff3b30 !important; }
    </style>
</head>
<body>

    <div id="lobby" class="fixed inset-0 z-[200] bg-[#050505] flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-12">
            <h1 class="text-5xl font-bold tracking-tighter mb-2">MeetFlow</h1>
            <p class="text-blue-500 text-[10px] tracking-[0.4em] uppercase font-bold">Secure HD Video</p>
        </div>

        <div class="w-full max-w-sm space-y-6">
            <div class="p-8 rounded-[2.5rem] bg-neutral-900/50 border border-white/5">
                <p class="text-[10px] text-neutral-500 uppercase tracking-[0.2em] mb-3">ID Numaranız</p>
                <div id="my-id" class="text-3xl font-mono text-white font-bold tracking-tight italic">...</div>
            </div>

            <div class="space-y-4">
                <input type="tel" id="remote-id" placeholder="Bağlanılacak ID" 
                    class="w-full bg-neutral-900 border-none rounded-2xl p-5 text-center text-2xl font-mono focus:ring-2 ring-blue-600 outline-none placeholder:text-neutral-700">
                
                <button id="call-btn" class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto shadow-2xl shadow-green-500/30 hover:scale-105 transition active:scale-95">
                    <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
                </button>
            </div>
            <p class="text-[10px] text-neutral-600">Kamerayı etkinleştirmek için bir yere dokunun</p>
        </div>
    </div>

    <div id="call-screen" class="hidden relative h-full w-full bg-black">
        <video id="remote-video" autoplay playsinline></video>
        
        <div id="local-video-container">
            <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="absolute inset-0 pointer-events-none flex flex-col justify-end p-8 z-50">
            <div class="flex justify-center items-center gap-4 safe-area-bottom">
                <button id="toggle-mic" class="ctrl-btn glass-ui text-white">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z"/></svg>
                </button>
                <button id="toggle-video" class="ctrl-btn glass-ui text-white">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17,10.5V7A1,1 0 0,0 16,6H4A1,1 0 0,0 3,7V17A1,1 0 0,0 4,18H16A1,1 0 0,0 17,17V13.5L21,17.5V6.5L17,10.5Z"/></svg>
                </button>
                <button id="toggle-chat" class="ctrl-btn glass-ui text-white">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20,2H4A2,2 0 0,0 2,4V22L6,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2M20,16H5.17L4,17.17V4H20V16Z"/></svg>
                </button>
                <button id="hangup-btn" class="ctrl-btn bg-red-600 shadow-xl shadow-red-600/30">
                    <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M12,9C10.4,9 8.85,9.25 7.4,9.72V12.82C7.4,13.22 7.17,13.56 6.84,13.72C5.86,14.21 4.97,14.84 4.17,15.57C4,15.75 3.75,15.86 3.5,15.86C3.2,15.86 2.95,15.74 2.77,15.56L0.29,13.08C0.11,12.9 0,12.65 0,12.38C0,12.1 0.11,11.85 0.29,11.67C3.38,8.77 7.48,7 12,7C16.52,7 20.62,8.77 23.71,11.67C23.89,11.85 24,12.1 24,12.38C24,12.65 23.89,12.9 23.71,13.08L21.23,15.56C21.05,15.74 20.8,15.86 20.5,15.86C20.25,15.86 20,15.75 19.82,15.57C19.03,14.84 18.14,14.21 17.16,13.72C16.83,13.56 16.6,13.22 16.6,12.82V9.72C15.15,9.25 13.6,9 12,9Z"/></svg>
                </button>
            </div>
        </div>

        <div id="chat-panel" class="glass-dark p-6 flex flex-col pointer-events-auto shadow-2xl">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-8" id="close-chat"></div>
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2 scrollbar-hide"></div>
            <div class="flex gap-3 pb-8">
                <input type="text" id="chat-input" placeholder="Mesaj..." class="flex-1 bg-white/10 rounded-2xl px-5 py-4 outline-none border border-white/5 text-base">
                <button id="send-btn" class="bg-blue-600 px-6 rounded-2xl font-bold">➤</button>
            </div>
        </div>
    </div>

    <script>
        const myUniqueId = "5" + Math.floor(100000000 + Math.random() * 900000000).toString();
        
        // Aynı ağdaki cihazların birbirini görmesi için kritik STUN yapılandırması
        const peer = new Peer(myUniqueId, {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        let localStream, currentCall, currentConn;
        let isMic = true, isVid = true;

        // Kamerayı kesin olarak başlatan fonksiyon
        async function startMedia() {
            if (localStream) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = localStream;
                console.log("Kamera başarıyla başlatıldı.");
            } catch (e) {
                console.error("Kamera hatası:", e);
                if (e.name === "NotAllowedError") alert("Kamera izni reddedildi. Lütfen site ayarlarından izin verin.");
            }
        }

        // Kullanıcı etkileşimi ile kamerayı tetikle (Tarayıcı engellerini aşmak için)
        window.addEventListener('click', startMedia, { once: true });
        window.addEventListener('touchstart', startMedia, { once: true });

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
        });

        // GELEN ARAMA
        peer.on('call', call => {
            if(confirm("Gelen Arama: " + call.peer)) {
                currentCall = call;
                call.answer(localStream);
                showCallUI();
                call.on('stream', s => document.getElementById('remote-video').srcObject = s);
                call.on('close', () => location.reload());
            }
        });

        // GELEN MESAJ BAĞLANTISI
        peer.on('connection', conn => {
            currentConn = conn;
            conn.on('data', d => appendMsg(d, 'remote'));
        });

        // ARAMA BAŞLATMA
        document.getElementById('call-btn').onclick = async () => {
            const rId = document.getElementById('remote-id').value;
            if(rId.length !== 10) return alert("10 haneli ID girin");
            
            await startMedia(); // Arama öncesi kamera kontrolü
            
            showCallUI();
            currentCall = peer.call(rId, localStream);
            currentConn = peer.connect(rId);
            
            currentCall.on('stream', s => document.getElementById('remote-video').srcObject = s);
            currentConn.on('open', () => currentConn.on('data', d => appendMsg(d, 'remote')));
            currentCall.on('close', () => location.reload());
        };

        function showCallUI() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');
        }

        function appendMsg(m, type) {
            const d = document.createElement('div');
            d.className = `p-4 rounded-2xl max-w-[85%] ${type === 'me' ? 'bg-blue-600 ml-auto' : 'bg-white/10 text-white'}`;
            d.innerText = m;
            const box = document.getElementById('chat-messages');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => {
            const m = document.getElementById('chat-input').value;
            if(m && currentConn) {
                currentConn.send(m);
                appendMsg(m, 'me');
                document.getElementById('chat-input').value = '';
            }
        };

        // KONTROLLER
        document.getElementById('toggle-mic').onclick = function() {
            isMic = !isMic;
            localStream.getAudioTracks()[0].enabled = isMic;
            this.classList.toggle('btn-red', !isMic);
        };
        document.getElementById('toggle-video').onclick = function() {
            isVid = !isVid;
            localStream.getVideoTracks()[0].enabled = isVid;
            this.classList.toggle('btn-red', !isVid);
        };
        document.getElementById('toggle-chat').onclick = () => document.getElementById('chat-panel').classList.add('open');
        document.getElementById('close-chat').onclick = () => document.getElementById('chat-panel').classList.remove('open');
        document.getElementById('hangup-btn').onclick = () => location.reload();

    </script>
</body>
</html>
