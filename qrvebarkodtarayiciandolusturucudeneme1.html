<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR & Barkod Merkezi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --accent: #0071e3;
            --border: #d2d2d7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 9px;
            background: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .content { display: none; text-align: center; }
        .content.active { display: block; }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
            outline: none;
        }

        #qrcode {
            margin: 10px auto;
            padding: 15px;
            background: white;
            display: inline-block;
            border-radius: 12px;
        }

        #reader {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: none !important;
            background: #000;
        }

        .result-box {
            background: #fbfbfd;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid var(--border);
            margin-top: 15px;
            min-height: 40px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
        }

        #qr-canvas { display: none; } /* İndirme için gizli canvas */
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('create', this)">Oluştur</button>
        <button class="tab-btn" onclick="switchTab('scan', this)">Tara</button>
    </div>

    <div id="create-content" class="content active">
        <input type="text" id="qr-input" placeholder="Metin veya link girin..." oninput="generateQR()">
        <div id="qrcode"></div>
        <p style="font-size: 11px; color: var(--subtext);">Otomatik olarak güncellenir.</p>
    </div>

    <div id="scan-content" class="content">
        <div id="reader"></div>
        <div id="scan-result" class="result-box">Kamera izni bekleniyor...</div>
        <button id="start-btn" class="btn" onclick="initScanner()">Kamerayı Başlat</button>
        <button id="stop-btn" class="btn" style="display:none; background:#ff3b30;" onclick="stopScanner()">Durdur</button>
    </div>
</div>

<script>
    // --- SEKME YÖNETİMİ ---
    function switchTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(type + '-content').classList.add('active');
        if (type !== 'scan') stopScanner();
    }

    // --- QR OLUŞTURUCU ---
    const qrContainer = document.getElementById("qrcode");
    const qrcode = new QRCode(qrContainer, {
        width: 200,
        height: 200,
        colorDark : "#1d1d1f",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    function generateQR() {
        const val = document.getElementById("qr-input").value;
        if (val.trim() === "") {
            qrcode.makeCode("https://google.com");
        } else {
            qrcode.makeCode(val);
        }
    }
    generateQR(); // Başlangıç kodu

    // --- QR TARAYICI (Garantili Mod) ---
    let scanner = null;

    async function initScanner() {
        const resultBox = document.getElementById('scan-result');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        resultBox.innerText = "Kamera başlatılıyor...";
        
        if (!scanner) {
            scanner = new Html5Qrcode("reader");
        }

        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        // Kamera başlatma denemesi
        scanner.start(
            { facingMode: "environment" }, // Arka kamerayı dene
            config,
            (text) => {
                resultBox.innerHTML = `<strong>Sonuç:</strong><br><a href="${text}" target="_blank" style="color:#0071e3">${text}</a>`;
                if (navigator.vibrate) navigator.vibrate(100);
            }
        ).then(() => {
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            resultBox.innerText = "Kod bekleniyor...";
        }).catch(err => {
            console.error(err);
            // Eğer arka kamera hatası (NotAllowed/NotFound) ise herhangi bir kamerayı dene
            scanner.start({ facingMode: "user" }, config, (text) => {
                resultBox.innerText = "Sonuç: " + text;
            }).catch(err2 => {
                resultBox.innerHTML = `<span style="color:#ff3b30">Hata: İzin reddedildi.</span><br><small>Lütfen tarayıcı ayarlarından kamera iznini açın.</small>`;
                startBtn.style.display = "block";
            });
        });
    }

    function stopScanner() {
        if (scanner && scanner.isScanning) {
            scanner.stop().then(() => {
                document.getElementById('start-btn').style.display = "block";
                document.getElementById('stop-btn').style.display = "none";
                document.getElementById('scan-result').innerText = "Kamera durduruldu.";
            });
        }
    }
</script>

</body>
</html>
