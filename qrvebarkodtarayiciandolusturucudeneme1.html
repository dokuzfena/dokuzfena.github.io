<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR & Barkod Merkezi Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --accent: #0071e3;
            --border: #d2d2d7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: none;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .content { display: none; text-align: center; }
        .content.active { display: block; }

        /* Oluşturucu */
        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
        }

        #qrcode {
            margin: 20px auto;
            padding: 15px;
            background: white;
            display: inline-block;
            border-radius: 12px;
        }

        /* Tarayıcı */
        #reader {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: none !important;
        }

        .result-box {
            background: #fbfbfd;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid var(--border);
            margin-top: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('create', this)">QR Oluştur</button>
        <button class="tab-btn" onclick="switchTab('scan', this)">QR Tara</button>
    </div>

    <div id="create-content" class="content active">
        <input type="text" id="qr-text" placeholder="URL veya metin yazın..." oninput="generateQR()">
        <div id="qrcode"></div>
    </div>

    <div id="scan-content" class="content">
        <div id="reader"></div>
        <div id="scan-result" class="result-box">Kamera başlatılmadı.</div>
        <button id="start-scan-btn" class="btn" onclick="initScanner()">Kamerayı Başlat</button>
    </div>
</div>

<script>
    // SEKME SİSTEMİ
    function switchTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(type + '-content').classList.add('active');
        
        if(type !== 'scan') {
            stopScanner();
        }
    }

    // --- QR OLUŞTURUCU ---
    const qrDiv = document.getElementById("qrcode");
    let qrcodeGen = new QRCode(qrDiv, { width: 200, height: 200 });

    function generateQR() {
        const text = document.getElementById("qr-text").value;
        if (text.trim() !== "") {
            qrcodeGen.makeCode(text);
        }
    }
    qrcodeGen.makeCode("https://google.com");

    // --- QR TARAYICI (Garantili Yöntem) ---
    let html5QrCode;

    function initScanner() {
        const resultBox = document.getElementById('scan-result');
        const startBtn = document.getElementById('start-scan-btn');
        
        startBtn.style.display = "none";
        resultBox.innerText = "Kamera hazırlanıyor...";

        html5QrCode = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // Başarılı okuma
                resultBox.innerHTML = `<strong>Sonuç:</strong> <br> ${decodedText}`;
                if(navigator.vibrate) navigator.vibrate(100);
            },
            (errorMessage) => {
                // Sürekli tarama yaptığı için burayı boş bırakıyoruz
            }
        ).catch((err) => {
            resultBox.innerText = "Hata: " + err;
            startBtn.style.display = "block";
        });
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById('start-scan-btn').style.display = "block";
                document.getElementById('scan-result').innerText = "Kamera durduruldu.";
            });
        }
    }
</script>

</body>
</html>
