<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Medya | Dokuz FEN A</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arka Plan Süslemesi (Minimalist Gradyan) */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
        }

        header {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            text-decoration: none;
            color: white;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .title-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .title-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
        }

        .title-section p {
            color: #666;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Sosyal Medya Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .social-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .social-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px) scale(1.02);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            transition: 0.3s;
        }

        .social-card:hover .icon-box {
            background: white;
        }

        .social-card:hover svg {
            fill: black;
        }

        .info h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .info span {
            font-size: 0.8rem;
            color: #666;
        }

        svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: 0.3s;
        }

        @media (max-width: 600px) {
            .social-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
