<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Ağ ve Konum Analizörü</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --subtext: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card);
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        h2 { font-weight: 600; font-size: 24px; margin-bottom: 25px; text-align: center; }

        .group-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--subtext);
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
        }

        .data-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .row:last-child { border-bottom: none; }

        .label { color: var(--subtext); font-size: 14px; }
        .value { font-weight: 500; font-size: 14px; text-align: right; }

        .btn-main {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-main:hover { opacity: 0.9; }
        
        #map-btn {
            display: none;
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-size: 14px;
        }

        .loading { color: #ccc; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Analizörü</h2>

    <div class="group-title">Ağ & Bağlantı</div>
    <div class="data-card">
        <div class="row">
            <span class="label">IP Adresi</span>
            <span id="ip" class="value loading">Yükleniyor...</span>
        </div>
        <div class="row">
            <span class="label">Sağlayıcı</span>
            <span id="isp" class="value loading">Yükleniyor...</span>
        </div>
        <div class="row">
            <span class="label">Gecikme (Ping)</span>
            <span id="ping" class="value">- ms</span>
        </div>
    </div>

    <div class="group-title">Cihaz & Yazılım</div>
    <div class="data-card">
        <div class="row">
            <span class="label">İşletim Sistemi</span>
            <span id="os" class="value">-</span>
        </div>
        <div class="row">
            <span class="label">Tarayıcı</span>
            <span id="browser" class="value">-</span>
        </div>
    </div>

    <div class="group-title">Coğrafi Konum</div>
    <div class="data-card">
        <div class="row">
            <span class="label">Enlem/Boylam</span>
            <span id="coords" class="value">İzin Bekleniyor</span>
        </div>
        <div class="row">
            <span class="label">Hassasiyet</span>
            <span id="accuracy" class="value">-</span>
        </div>
    </div>

    <button class="btn-main" onclick="fullAnaliz()">Tüm Verileri Güncelle</button>
    <a id="map-btn" target="_blank">📍 Haritada Göster</a>
</div>

<script>
    async function fullAnaliz() {
        const startTime = Date.now();
        
        // 1. IP, ISP ve Ping (Hızlı ve HTTPS uyumlu tek dış temas)
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('isp').innerText = data.org;
            document.getElementById('ping').innerText = (Date.now() - startTime) + " ms";
            document.getElementById('ip').classList.remove('loading');
            document.getElementById('isp').classList.remove('loading');
        } catch (e) {
            document.getElementById('ip').innerText = "Hata (VPN?)";
            document.getElementById('isp').innerText = "Tespit Edilemedi";
        }

        // 2. Cihaz ve OS Bilgisi
        const ua = navigator.userAgent;
        let os = "Bilinmiyor";
        if (ua.indexOf("Win") != -1) os = "Windows";
        if (ua.indexOf("Mac") != -1) os = "macOS/iOS";
        if (ua.indexOf("Android") != -1) os = "Android";
        if (ua.indexOf("Linux") != -1) os = "Linux";
        
        document.getElementById('os').innerText = os;
        document.getElementById('browser').innerText = navigator.appName === "Netscape" ? "Modern Tarayıcı" : navigator.appName;

        // 3. Tam Lokasyon (GPS)
        if (navigator.geolocation) {
            document.getElementById('coords').innerText = "İzin İsteniyor...";
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude.toFixed(5);
                const lon = pos.coords.longitude.toFixed(5);
                document.getElementById('coords').innerText = `${lat}, ${lon}`;
                document.getElementById('accuracy').innerText = `±${Math.round(pos.coords.accuracy)}m`;
                
                const mBtn = document.getElementById('map-btn');
                mBtn.href = `https://www.google.com/maps?q=${lat},${lon}`;
                mBtn.style.display = "block";
            }, (err) => {
                document.getElementById('coords').innerText = "İzin Reddedildi";
            }, { enableHighAccuracy: true });
        }
    }

    // Sayfa açıldığında otomatik çalıştır
    window.onload = fullAnaliz;
</script>

</body>
</html>
