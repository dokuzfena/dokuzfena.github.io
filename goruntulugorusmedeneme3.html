<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet | Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* Ana Video Alanı (Karşı Taraf) */
        #remote-wrapper { width: 100vw; height: 100vh; background: #0a0a0a; position: relative; }
        video#remote-v { width: 100%; height: 100%; object-fit: cover; }

        /* Kendi Videon (iOS Tarzı) */
        #local-wrapper {
            position: absolute; top: 20px; right: 20px; width: 130px; height: 190px;
            border-radius: 20px; overflow: hidden; z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            background: #111;
        }
        video#local-v { width: 100%; height: 100%; object-fit: cover; }

        /* Üst Bilgi Barı */
        .header-info {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        .glass-tag {
            padding: 10px 18px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); font-size: 14px;
            cursor: pointer; transition: 0.3s;
        }
        .glass-tag:hover { background: rgba(255,255,255,0.2); }

        /* Alt Kontrol Paneli */
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; padding: 15px;
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(25px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 100;
        }
        .btn {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; background: rgba(255,255,255,0.1); color: white; transition: 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .btn.active { background: #ff3b30; }
        .btn-end { background: #ff3b30; width: 65px; border-radius: 20px; }

        /* Sohbet Kutusu (Gizli Başlar) */
        #chat-window {
            position: absolute; bottom: 100px; right: 20px; width: 300px; height: 400px;
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            display: none; flex-direction: column; z-index: 1000; overflow: hidden;
        }
        #chat-msgs { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-input { padding: 15px; display: flex; gap: 5px; background: rgba(255,255,255,0.05); }
        .chat-input input {
            flex: 1; background: transparent; border: none; color: white; outline: none;
        }

        @media (max-width: 600px) {
            #local-wrapper { width: 100px; height: 150px; }
            .controls { gap: 8px; padding: 10px; width: 90%; justify-content: center; }
            .btn { width: 40px; height: 40px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="header-info">
        <div class="glass-tag" onclick="copyLink()">🔗 Linki Kopyala ve Paylaş</div>
        <div id="status" class="glass-tag" style="pointer-events:none; opacity:0.8;">⌛ Bekleniyor...</div>
    </div>

    <div id="remote-wrapper">
        <video id="remote-v" autoplay playsinline></video>
    </div>

    <div id="local-wrapper">
        <video id="local-v" autoplay muted playsinline></video>
    </div>

    <div id="chat-window">
        <div style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.1); font-weight:bold;">Sohbet</div>
        <div id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="m-input" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:none; border:none; color:#007aff; font-weight:bold; cursor:pointer;">Gönder</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="toggleMic()" id="mic-btn">🎙️</button>
        <button class="btn" onclick="toggleCam()" id="cam-btn">📹</button>
        <button class="btn" onclick="shareScreen()">🖥️</button>
        <button class="btn" onclick="toggleChat()">💬</button>
        <button class="btn" onclick="takePhoto()">📸</button>
        <button class="btn btn-end" onclick="location.reload()">📞</button>
    </div>

    <script>
        const roomId = window.location.hash.substring(1) || Math.random().toString(36).substring(7);
        if(!window.location.hash) window.location.hash = roomId;

        const peer = new Peer('room-' + roomId, {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        let localStream, dataConn;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('local-v').srcObject = stream;

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', s => {
                    document.getElementById('remote-v').srcObject = s;
                    document.getElementById('status').innerText = "✅ Bağlantı Kuruldu";
                });
            });

            peer.on('connection', conn => {
                dataConn = conn;
                setupChat();
            });

            peer.on('error', err => {
                if(err.type === 'unavailable-id') {
                    const guest = new Peer();
                    guest.on('open', () => {
                        const call = guest.call('room-' + roomId, localStream);
                        call.on('stream', s => {
                            document.getElementById('remote-v').srcObject = s;
                            document.getElementById('status').innerText = "✅ Bağlantı Kuruldu";
                        });
                        dataConn = guest.connect('room-' + roomId);
                        setupChat();
                    });
                }
            });
        });

        function setupChat() {
            dataConn.on('data', data => addMsg('Arkadaşın', data));
            document.getElementById('status').innerText = "✅ Bağlantı Kuruldu";
        }

        function sendMsg() {
            const inp = document.getElementById('m-input');
            if(!inp.value || !dataConn) return;
            dataConn.send(inp.value);
            addMsg('Sen', inp.value);
            inp.value = '';
        }

        function addMsg(who, txt) {
            const box = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.style.marginBottom = "10px";
            d.innerHTML = `<span style="color:#007aff; font-size:12px;">${who}:</span> <div style="background:rgba(255,255,255,0.1); padding:8px; border-radius:10px; margin-top:3px;">${txt}</div>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function toggleChat() {
            const chat = document.getElementById('chat-window');
            chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link kopyalandı! Arkadaşına gönder.");
        }

        function toggleMic() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('mic-btn').classList.toggle('active', !t.enabled);
        }

        function toggleCam() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('cam-btn').classList.toggle('active', !t.enabled);
        }

        async function shareScreen() {
            const s = await navigator.mediaDevices.getDisplayMedia({video: true});
            document.getElementById('local-v').srcObject = s;
        }

        function takePhoto() {
            const v = document.getElementById('local-v');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const a = document.createElement('a');
            a.download = 'meet-foto.png'; a.href = c.toDataURL(); a.click();
        }
    </script>
</body>
</html>
